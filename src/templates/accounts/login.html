{% extends 'base.html' %}
{% load static %}

{% block auth_content %}
<div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">
  <div class="login-card card shadow-lg border-0" style="width:420px; max-width:95vw;">
    <!-- 헤더 -->
    <div class="card-header text-center py-4 bg-primary text-white border-0">
      <div class="mb-2">
        <i class="bi bi-diagram-3-fill fs-1"></i>
      </div>
      <h5 class="fw-bold mb-0">NPMS</h5>
      <small class="opacity-75">학교 네트워크 장애관리 시스템</small>
    </div>
    <!-- 바디 -->
    <div class="card-body p-4">
      {% if error %}
        <div class="alert alert-danger alert-sm py-2 px-3 mb-3">
          <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
      {% endif %}
      <form method="post" autocomplete="off">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
        <div class="mb-3">
          <label class="form-label small fw-semibold">아이디</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-person text-muted"></i></span>
            <input type="text" name="username" class="form-control" placeholder="아이디 입력" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label small fw-semibold">비밀번호</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
            <button class="btn btn-outline-secondary" type="button" id="togglePw">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
          <i class="bi bi-box-arrow-in-right me-1"></i>로그인
        </button>
      </form>
    </div>
    <!-- 푸터 -->
    <div class="card-footer text-center text-muted py-3 bg-light border-0">
      <small>
        장애접수 문의: <strong class="text-primary">1551-5596</strong>
      </small>
    </div>
  </div>
  <!-- 유관기관 링크 -->
  <div class="position-fixed bottom-0 start-0 end-0 py-2 text-center" style="background:rgba(0,0,0,.03)">
    <div class="d-flex flex-wrap justify-content-center gap-2">
      {% for name, url in related_sites %}
        <a href="{{ url }}" target="_blank" class="text-muted text-decoration-none" style="font-size:.75rem;">{{ name }}</a>
      {% endfor %}
    </div>
  </div>
</div>
<script>
document.getElementById('togglePw').addEventListener('click', function() {
  const pw = document.querySelector('[name=password]');
  const icon = this.querySelector('i');
  if (pw.type === 'password') {
    pw.type = 'text'; icon.className = 'bi bi-eye-slash';
  } else {
    pw.type = 'password'; icon.className = 'bi bi-eye';
  }
});
</script>
{% endblock %}
