<!-- 전자서명 모달 — mobile/includes/signature_modal.html -->
<!-- 사용법: {% include 'mobile/includes/signature_modal.html' %} -->
<div class="modal fade" id="signModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius:16px;">
      <div class="modal-header border-0 pb-0">
        <h6 class="modal-title fw-bold">전자서명</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-2">

        <div class="mb-2">
          <input type="text" id="sign-name" class="form-control form-control-sm"
                 placeholder="서명자 이름">
        </div>
        <div class="mb-3">
          <input type="text" id="sign-role" class="form-control form-control-sm"
                 placeholder="역할 (예: 설치자, 확인자)">
        </div>

        <!-- 서명 캔버스 -->
        <div style="border:2px solid #dee2e6;border-radius:10px;background:#fafafa;
                    position:relative;overflow:hidden;">
          <canvas id="signature-canvas" style="display:block;width:100%;touch-action:none;"
                  height="160"></canvas>
          <div id="sign-placeholder"
               style="position:absolute;inset:0;display:flex;align-items:center;
                      justify-content:center;color:#ccc;font-size:14px;
                      pointer-events:none;">
            여기에 서명하세요
          </div>
        </div>

        <div class="d-flex gap-2 mt-2">
          <button type="button" class="btn btn-outline-secondary btn-sm flex-fill"
                  id="btn-sign-clear" onclick="signClear()">
            <i class="bi bi-eraser me-1"></i>지우기
          </button>
          <button type="button" class="btn btn-primary btn-sm flex-fill"
                  id="btn-sign-submit" onclick="signSubmit()">
            <i class="bi bi-check-circle me-1"></i>서명 완료
          </button>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('signature-canvas');
  const ctx    = canvas.getContext('2d');
  let drawing  = false;
  let hasSig   = false;

  function resize(){
    const w = canvas.offsetWidth;
    canvas.width  = w * window.devicePixelRatio;
    canvas.height = 160 * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth   = 2.5;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
  }

  function pos(e){
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }

  canvas.addEventListener('mousedown',  e=>{ drawing=true; ctx.beginPath(); ctx.moveTo(...Object.values(pos(e))); });
  canvas.addEventListener('mousemove',  e=>{ if(!drawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); hasSig=true; document.getElementById('sign-placeholder').style.display='none'; });
  canvas.addEventListener('mouseup',    ()=>drawing=false);
  canvas.addEventListener('touchstart', e=>{ e.preventDefault(); drawing=true; ctx.beginPath(); ctx.moveTo(...Object.values(pos(e))); }, {passive:false});
  canvas.addEventListener('touchmove',  e=>{ e.preventDefault(); if(!drawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); hasSig=true; document.getElementById('sign-placeholder').style.display='none'; }, {passive:false});
  canvas.addEventListener('touchend',   ()=>drawing=false);

  window.signClear = function(){
    ctx.clearRect(0, 0, canvas.width/window.devicePixelRatio, canvas.height/window.devicePixelRatio);
    hasSig = false;
    document.getElementById('sign-placeholder').style.display='flex';
  };

  window.signGetData = function(){
    if(!hasSig) return null;
    return canvas.toDataURL('image/png');
  };

  window.signHasData = function(){ return hasSig; };

  document.getElementById('signModal').addEventListener('shown.bs.modal', resize);
  document.getElementById('signModal').addEventListener('hidden.bs.modal', ()=>{
    signClear();
    document.getElementById('sign-name').value = '';
    document.getElementById('sign-role').value = '';
  });
})();
</script>
