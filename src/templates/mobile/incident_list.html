{% extends 'mobile/base.html' %}
{% block title %}장애 목록{% endblock %}
{% block header_title %}장애 목록{% endblock %}
{% block nav_incidents %}active{% endblock %}
{% block content %}
<div id="incident-list-wrap">
  <div class="text-center py-5 text-muted">
    <div class="spinner-border spinner-border-sm me-1"></div> 불러오는 중...
  </div>
</div>
{% endblock %}
{% block extra_script %}
<script>
async function loadIncidents(){
  const wrap = document.getElementById('incident-list-wrap');
  try {
    const resp = await fetch(`${API_BASE}/incidents/incidents/?page_size=30&ordering=-created_at`, {
      headers: {'X-CSRFToken': CSRF_TOKEN}
    });
    const data = await resp.json();
    const items = data.results || [];
    if(!items.length){ wrap.innerHTML='<div class="text-center py-5 text-muted">장애 없음</div>'; return; }
    const statusColor = {received:'secondary',assigned:'primary',moving:'info',arrived:'warning',processing:'warning',completed:'success',cancelled:'dark'};
    const statusLabel = {received:'접수',assigned:'배정',moving:'이동중',arrived:'현장도착',processing:'처리중',completed:'완료',cancelled:'취소'};
    wrap.innerHTML = items.map(i=>`
      <a href="/npms/mobile/incidents/${i.id}/" class="card card-field text-decoration-none text-dark">
        <div class="card-body p-3">
          <div class="d-flex justify-content-between align-items-start mb-1">
            <span class="fw-bold" style="font-size:15px;">${i.school_name||'-'}</span>
            <span class="badge bg-${statusColor[i.status]||'secondary'} badge-status">${statusLabel[i.status]||i.status}</span>
          </div>
          <div class="text-muted" style="font-size:13px;">${i.category_name||''} ${i.incident_number||''}</div>
        </div>
      </a>`).join('');
  } catch(e) {
    wrap.innerHTML='<div class="text-center py-5 text-danger">불러오기 실패</div>';
  }
}
loadIncidents();
</script>
{% endblock %}
