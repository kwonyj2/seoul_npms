version: '3.8'

services:
  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  db:
    image: postgres:15
    container_name: npms_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - npms_pgdata:/var/lib/postgresql/data
    networks:
      - npms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: npms_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-npmsRedis2026Secure}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - npms_redis_data:/data
    networks:
      - npms_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-npmsRedis2026Secure}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Django Web
  # ─────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: npms_web
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./src:/app
      - npms_static:/app/staticfiles
      - ${NAS_MOUNT_PATH:-/mnt/lvm-cache}:/app/nas
      - /var/log/auth.log:/var/log/auth.log:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    command: sh /app/docker-entrypoint.sh
    networks:
      - npms_network

  # ─────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: npms_celery_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app
      - ${NAS_MOUNT_PATH:-/mnt/lvm-cache}:/app/nas
      - /var/log/auth.log:/var/log/auth.log:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    command: celery -A config.celery worker --loglevel=info --concurrency=4
    networks:
      - npms_network

  # ─────────────────────────────────────────
  # Celery Beat (스케줄러)
  # ─────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: npms_celery_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app
      - ${NAS_MOUNT_PATH:-/mnt/lvm-cache}:/app/nas
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    command: celery -A config.celery beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - npms_network

  # ─────────────────────────────────────────
  # Flower (Celery 모니터링)
  # ─────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: npms_flower
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - celery_worker
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    command: >
      celery -A config.celery flower
      --port=5555
      --url_prefix=npms/flower
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-npmsflower2024}
    expose:
      - "5555"
    networks:
      - npms_network

  # ─────────────────────────────────────────
  # FastAPI AI Server
  # ─────────────────────────────────────────
  ai_server:
    build:
      context: ./ai_server
      dockerfile: Dockerfile
    container_name: npms_ai
    restart: unless-stopped
    env_file: .env
    # 외부 포트 노출 없음 — npms_web 컨테이너에서만 http://npms_ai:8001 으로 접근
    expose:
      - "8001"
    networks:
      - npms_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  # Nginx
  # ─────────────────────────────────────────
  nginx:
    image: nginx:mainline
    container_name: npms_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - npms_static:/app/staticfiles:ro
      - ${NAS_MOUNT_PATH:-/mnt/lvm-cache}:/app/nas:ro
    depends_on:
      - web
    networks:
      - npms_network

volumes:
  npms_pgdata:
  npms_redis_data:
  npms_static:

networks:
  npms_network:
    driver: bridge
