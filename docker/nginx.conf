upstream npms_app {
    server npms_web:8000;
    keepalive 32;
}

# ── gzip 압축 ────────────────────────────────────────────────
gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # ── 보안 헤더 ────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: blob:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;

    # 서버 버전 숨김
    server_tokens off;

    # 정적 파일 — 1년 캐시 + immutable (파일명 해시로 캐시 무효화)
    location /npms/static/ {
        alias /app/staticfiles/;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 미디어 파일 (NAS 통합 경로)
    location /npms/media/ {
        alias /app/nas/media/npms/;
        expires 7d;
        access_log off;
    }

    # ── Django Admin — 내부 IP만 허용 ────────────────────────
    location /npms/admin/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 112.187.158.0/24;
        deny all;
        proxy_pass http://npms_app/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API 문서 — 내부 IP만 허용 ────────────────────────────
    location ~ ^/npms/api/(schema|docs|redoc)/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 112.187.158.0/24;
        deny all;
        proxy_pass http://npms_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Flower Celery 모니터링 — 내부 IP만 허용
    location /npms/flower/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 112.187.158.0/24;
        deny all;
        proxy_pass http://npms_flower:5555/npms/flower/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Django 앱
    location /npms/ {
        proxy_pass http://npms_app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;

        # 보안 헤더 (Django 기본 헤더 숨기고 nginx에서 통일)
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    }

    # WebSocket (Django Channels)
    location /npms/ws/ {
        proxy_pass http://npms_app/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 헬스체크
    location /health/ {
        proxy_pass http://npms_app/health/;
        proxy_set_header Host $host;
        access_log off;
    }
}
