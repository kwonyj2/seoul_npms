upstream npms_app {
    server npms_web:8000;
    keepalive 32;
}

# ── DDoS/봇 방어: Rate Limit ─────────────────────────────────
# 일반 요청: IP당 초당 10회, 버스트 20회 허용
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
# 로그인: IP당 분당 5회 (브루트포스 방어)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
# API: IP당 초당 5회
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
# 429 응답 코드
limit_req_status 429;

# ── 슬로우로리스 방어 ────────────────────────────────────────
client_body_timeout 10s;
client_header_timeout 10s;
send_timeout 30s;

# ── gzip 압축 ────────────────────────────────────────────────
gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

# ── HTTP → HTTPS 리다이렉트 ──────────────────────────────────
server {
    listen 80;
    server_name _;
    server_tokens off;

    # 헬스체크는 HTTP로 유지
    location /health/ {
        proxy_pass http://npms_app/health/;
        proxy_set_header Host $host;
        access_log off;
    }

    # 나머지는 HTTPS로 리다이렉트
    location / {
        return 301 https://$host:8443$request_uri;
    }
}

# ── HTTPS 서버 ────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;
    client_max_body_size 100M;

    # ── SSL 인증서 ─────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── 외국 IP 차단 (한국 IP만 허용) ─────────────────────
    # $block_foreign 는 nginx-main.conf 에서 GeoIP + 한국ISP 대역으로 판정
    if ($block_foreign) {
        return 444;   # 연결 즉시 끊기 (응답 없음)
    }

    # ── 보안 헤더 ────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: blob:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 서버 버전 숨김
    server_tokens off;

    # 정적 파일 — 1년 캐시 + immutable
    location /npms/static/ {
        alias /app/staticfiles/;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 미디어 파일 (NAS 통합 경로)
    location /npms/media/ {
        alias /app/nas/media/npms/;
        expires 7d;
        access_log off;
    }

    # ── Django Admin — 내부 IP만 허용 ────────────────────────
    location /npms/admin/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 112.187.158.0/24;
        deny all;
        proxy_pass http://npms_app/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── API 문서 — 내부 IP만 허용 ────────────────────────────
    location ~ ^/npms/api/(schema|docs|redoc)/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 112.187.158.0/24;
        deny all;
        proxy_pass http://npms_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Flower Celery 모니터링 — 내부 IP만 허용
    location /npms/flower/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 112.187.158.0/24;
        deny all;
        proxy_pass http://npms_flower:5555/npms/flower/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    # 로그인 — 브루트포스 방어 (분당 5회)
    location /npms/accounts/login/ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://npms_app/accounts/login/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # API — 초당 5회 제한
    location /npms/api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://npms_app/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Django 앱 — 일반 요청 (초당 10회)
    location /npms/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://npms_app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;

        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # WebSocket (Django Channels)
    location /npms/ws/ {
        proxy_pass http://npms_app/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 헬스체크
    location /health/ {
        proxy_pass http://npms_app/health/;
        proxy_set_header Host $host;
        access_log off;
    }
}
