load_module modules/ngx_http_geoip_module.so;

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$geoip_country_code"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ══════════════════════════════════════════════════════
    # GeoIP 국가 판별 (A방식)
    # ══════════════════════════════════════════════════════
    geoip_country /usr/share/GeoIP/GeoIP.dat;

    # ══════════════════════════════════════════════════════
    # 한국 주요 ISP IP 대역 화이트리스트 (B방식 - 폴백)
    # GeoIP DB에 누락된 신규 한국 IP도 허용
    # ══════════════════════════════════════════════════════
    geo $is_korea_isp {
        default 0;
        # ── 내부/사설 IP (항상 허용) ──
        127.0.0.0/8     1;
        10.0.0.0/8      1;
        172.16.0.0/12   1;
        192.168.0.0/16  1;

        # ── 서울시교육청/운용서버 ──
        112.187.158.0/24 1;

        # ── KT (한국통신) ──
        39.7.0.0/16     1;
        110.45.0.0/16   1;
        116.120.0.0/13  1;
        175.192.0.0/11  1;
        210.180.0.0/14  1;
        211.32.0.0/11   1;
        218.144.0.0/12  1;
        218.232.0.0/13  1;

        # ── SK브로드밴드 ──
        58.120.0.0/13   1;
        61.32.0.0/11    1;
        112.144.0.0/12  1;
        121.128.0.0/11  1;
        211.108.0.0/14  1;
        220.64.0.0/11   1;

        # ── LG유플러스 ──
        106.240.0.0/12  1;
        114.200.0.0/13  1;
        117.16.0.0/12   1;
        182.208.0.0/12  1;
        211.168.0.0/13  1;
        220.116.0.0/14  1;

        # ── SKT 모바일 ──
        27.160.0.0/11   1;
        110.70.0.0/15   1;
        203.226.0.0/15  1;
        223.32.0.0/11   1;

        # ── KT 모바일 ──
        39.112.0.0/12   1;
        118.32.0.0/11   1;

        # ── LGU+ 모바일 ──
        106.96.0.0/11   1;
        211.36.0.0/15   1;

        # ── 공공/교육기관 (KREN, KRNIC) ──
        147.46.0.0/16   1;
        155.230.0.0/16  1;
        163.152.0.0/16  1;
        164.124.0.0/15  1;
        168.126.0.0/16  1;
        203.230.0.0/16  1;
        203.246.0.0/16  1;
        210.94.0.0/15   1;
        210.96.0.0/12   1;

        # ── 클라우드/IDC (네이버, 카카오, NHN 등) ──
        223.130.192.0/18 1;
        110.76.140.0/22  1;
        125.209.192.0/18 1;
    }

    # ══════════════════════════════════════════════════════
    # 최종 허용 판정: GeoIP=KR OR 한국ISP대역 OR 내부IP
    # ══════════════════════════════════════════════════════
    map $geoip_country_code $is_allowed_country {
        default 0;
        KR      1;
        ""      1;   # GeoIP 매칭 안 되는 경우 (사설IP 등)
    }

    # 둘 중 하나라도 1이면 허용
    map "$is_allowed_country:$is_korea_isp" $block_foreign {
        default       1;   # 차단
        "1:0"         0;   # GeoIP=KR → 허용
        "1:1"         0;   # GeoIP=KR + ISP → 허용
        "0:1"         0;   # ISP 대역 → 허용
    }

    include /etc/nginx/conf.d/*.conf;
}
